<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kova — Chat with anyone</title>
  <meta name="description" content="Kova — private 1-on-1 messaging. Sign up and start chatting." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ── AUTH SCREEN ── -->
<div id="screen-auth" class="screen active">
  <div class="auth-bg">
    <div class="auth-orb auth-orb--1"></div>
    <div class="auth-orb auth-orb--2"></div>
    <div class="auth-orb auth-orb--3"></div>
    <div class="auth-grid"></div>
  </div>
  <div class="auth-panel">
    <div class="auth-brand">
      <div class="auth-brand__mark">K</div>
      <span class="auth-brand__name">Kova</span>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Sign in</button>
      <button class="auth-tab" data-tab="signup">Create account</button>
    </div>

    <!-- Login -->
    <div class="auth-form active" id="form-login">
      <div class="field">
        <label class="field__label" for="login-email">Email</label>
        <input class="field__input" type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label class="field__label" for="login-password">Password</label>
        <input class="field__input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn btn--primary btn--full" id="btn-login">
        <span class="btn__text">Sign in</span>
        <span class="btn__spinner hidden"></span>
      </button>
    </div>

    <!-- Sign up -->
    <div class="auth-form" id="form-signup">
      <div class="field">
        <label class="field__label" for="signup-name">Display name</label>
        <input class="field__input" type="text" id="signup-name" placeholder="How you'll appear to others" maxlength="40" />
      </div>
      <div class="field">
        <label class="field__label" for="signup-email">Email</label>
        <input class="field__input" type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label class="field__label" for="signup-password">Password</label>
        <input class="field__input" type="password" id="signup-password" placeholder="Min. 6 characters" autocomplete="new-password" />
      </div>
      <button class="btn btn--primary btn--full" id="btn-signup">
        <span class="btn__text">Create account</span>
        <span class="btn__spinner hidden"></span>
      </button>
    </div>

    <p class="auth-error hidden" id="auth-error"></p>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="screen-app" class="screen">
  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <div class="sidebar__brand">
          <div class="sidebar__brand-mark">K</div>
          <span class="sidebar__brand-name">Kova</span>
        </div>
        <button class="icon-btn" id="btn-new-chat" title="New conversation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
      </div>

      <div class="sidebar__search">
        <div class="search-box">
          <svg class="search-box__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input class="search-box__input" type="text" id="search-input" placeholder="Search or start new chat…" autocomplete="off" />
        </div>
      </div>

      <!-- Search results -->
      <div class="search-results hidden" id="search-results"></div>

      <!-- Conversations list -->
      <div class="conv-list" id="conv-list">
        <div class="conv-list__empty">
          <p>No conversations yet.</p>
          <p>Search for someone to start chatting.</p>
        </div>
      </div>

      <div class="sidebar__footer">
        <div class="sidebar__me" id="sidebar-me">
          <div class="avatar" id="me-avatar"></div>
          <div class="sidebar__me-info">
            <span class="sidebar__me-name" id="me-name">—</span>
            <span class="sidebar__me-handle" id="me-handle">—</span>
          </div>
        </div>
        <button class="icon-btn icon-btn--danger" id="btn-signout" title="Sign out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- CHAT PANEL -->
    <main class="chat-panel" id="chat-panel">

      <!-- Empty / welcome state -->
      <div class="chat-welcome" id="chat-welcome">
        <div class="chat-welcome__mark">K</div>
        <h2 class="chat-welcome__title">Welcome to Kova</h2>
        <p class="chat-welcome__sub">Select a conversation or search for someone to start chatting.</p>
      </div>

      <!-- Active chat -->
      <div class="chat-view hidden" id="chat-view">
        <div class="chat-header" id="chat-header">
          <button class="icon-btn back-btn" id="btn-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <div class="chat-header__avatar" id="chat-avatar"></div>
          <div class="chat-header__info">
            <span class="chat-header__name" id="chat-name"></span>
            <span class="chat-header__handle" id="chat-handle"></span>
          </div>
        </div>

        <div class="messages-area" id="messages-area">
          <div class="messages-loading">
            <div class="spinner"></div>
          </div>
        </div>

        <div class="composer" id="composer">
          <textarea class="composer__input" id="msg-input" placeholder="Message…" rows="1" maxlength="2000"></textarea>
          <button class="composer__send" id="btn-send" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- NEW CHAT MODAL -->
<div class="modal-overlay" id="modal-new-chat" aria-hidden="true">
  <div class="modal">
    <div class="modal__header">
      <h3 class="modal__title">New conversation</h3>
      <button class="icon-btn" id="btn-close-modal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="field">
      <label class="field__label" for="modal-search">Search by username or name</label>
      <input class="field__input" type="text" id="modal-search" placeholder="e.g. john1234" autocomplete="off" />
    </div>
    <div class="modal-results" id="modal-results">
      <p class="modal-results__hint">Type to search for people</p>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/chat.js"></script>
<script src="js/app.js"></script>
</body>
</html>
